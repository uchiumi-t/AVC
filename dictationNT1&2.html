<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictation Practice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #f78166;
  --nt1: #58a6ff;
  --nt2: #d2a8ff;
  --text: #e6edf3;
  --muted: #7d8590;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 16px;
}

.screen { display: none; max-width: 740px; margin: 0 auto; }
.screen.active { display: block; }

h1 {
  font-family: 'Space Mono', monospace;
  font-size: clamp(1.15rem, 3vw, 1.65rem);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.subtitle { color: var(--muted); font-size: 0.84rem; margin-bottom: 26px; }

/* HOME */
.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-top: 6px;
}
@media(max-width:480px){ .home-grid { grid-template-columns: 1fr; } }

.book-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 36px 22px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  user-select: none;
}
.book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.45); }
.book-card.nt1:hover { border-color: var(--nt1); }
.book-card.nt2:hover { border-color: var(--nt2); }
.book-icon { font-size: 2.8rem; margin-bottom: 14px; }
.book-title { font-family: 'Space Mono', monospace; font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
.book-card.nt1 .book-title { color: var(--nt1); }
.book-card.nt2 .book-title { color: var(--nt2); }
.book-desc { color: var(--muted); font-size: 0.81rem; line-height: 1.65; }

/* BACK BUTTON */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); padding: 6px 14px; font-size: 0.78rem;
  cursor: pointer; font-family: 'Sora', sans-serif; margin-bottom: 18px;
  transition: color .12s, border-color .12s;
}
.back-btn:hover { color: var(--text); border-color: var(--muted); }

/* LESSON GRID */
.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 9px;
  margin-bottom: 20px;
}
.lesson-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); border-radius: 10px; padding: 11px 6px;
  cursor: pointer; font-family: 'Space Mono', monospace;
  font-size: 0.74rem; text-align: center; white-space: pre; line-height: 1.5;
  transition: all .13s;
}
.lesson-btn:hover { border-color: var(--accent); color: var(--text); }
.lesson-btn.sel-nt1 { background: var(--nt1); border-color: var(--nt1); color: #000; font-weight: 700; }
.lesson-btn.sel-nt2 { background: var(--nt2); border-color: var(--nt2); color: #000; font-weight: 700; }

.start-btn {
  display: block; width: 100%; max-width: 290px; margin: 0 auto;
  padding: 15px; border: none; border-radius: 12px; color: #000;
  font-family: 'Space Mono', monospace; font-size: .95rem; font-weight: 700;
  cursor: pointer; letter-spacing: .05em; transition: opacity .15s, transform .1s;
}
.start-btn.nt1 { background: var(--nt1); }
.start-btn.nt2 { background: var(--nt2); }
.start-btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }
.start-btn:not(:disabled):hover { opacity: .85; transform: translateY(-1px); }

/* PROGRESS */
.progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 5px; margin-bottom: 24px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; width: 0%; transition: width .4s ease; }
.progress-bar.nt1 { background: var(--nt1); }
.progress-bar.nt2 { background: var(--nt2); }

/* SENTENCE CARDS */
.sentence-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 22px 20px; margin-bottom: 14px;
}
.sentence-num { font-family: 'Space Mono', monospace; font-size: .67rem; letter-spacing: .1em; margin-bottom: 10px; }
.sentence-num.nt1 { color: var(--nt1); }
.sentence-num.nt2 { color: var(--nt2); }

/* play row: button + speed controls side by side */
.play-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
}
.speed-lbl { font-size: .7rem; color: var(--muted); }
.spd {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--muted); padding: 3px 9px; font-size: .7rem; font-family: 'Space Mono', monospace;
  cursor: pointer; transition: all .12s;
}
.spd.on-nt1 { border-color: var(--nt1); color: var(--nt1); }
.spd.on-nt2 { border-color: var(--nt2); color: var(--nt2); }
.speed-controls { display: flex; gap: 5px; align-items: center; }

.play-btn {
  display: inline-flex; align-items: center; gap: 7px; flex-shrink: 0;
  border-radius: 8px; padding: 7px 14px; cursor: pointer;
  font-family: 'Sora', sans-serif; font-size: .82rem; font-weight: 600;
  transition: all .13s; white-space: nowrap;
}
.play-btn.nt1 { background: var(--surface2); border: 1.5px solid var(--nt1); color: var(--nt1); }
.play-btn.nt1:hover, .play-btn.nt1.on { background: var(--nt1); color: #000; }
.play-btn.nt2 { background: var(--surface2); border: 1.5px solid var(--nt2); color: var(--nt2); }
.play-btn.nt2:hover, .play-btn.nt2.on { background: var(--nt2); color: #000; }

.ans-box {
  display: none; background: #1c2a1e; border: 2px solid var(--accent2);
  border-radius: 12px; padding: 18px 22px; margin-top: 4px;
}
.ans-box.show { display: block; animation: fi .3s ease; }
.ans-tag { font-family:'Space Mono',monospace; font-size:.63rem; color:var(--accent2); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
.ans-txt { font-size: 1.65rem; line-height: 1.6; font-weight: 600; letter-spacing: 0.01em; }

/* ACTIONS */
.act-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.reveal-btn {
  flex: 1; min-width: 145px; padding: 13px;
  background: transparent; border: 1.5px solid var(--accent3); border-radius: 10px;
  color: var(--accent3); font-family:'Space Mono',monospace; font-size:.81rem;
  cursor: pointer; transition: all .13s;
}
.reveal-btn:hover { background: var(--accent3); color: #000; }
.reveal-btn.done { opacity: .4; pointer-events: none; }

.nxt-btn {
  flex: 1; min-width: 145px; padding: 13px; border: none; border-radius: 10px;
  color: #000; font-family:'Space Mono',monospace; font-size:.81rem; font-weight:700;
  cursor: pointer; transition: opacity .13s; display: none;
}
.nxt-btn.nt1 { background: var(--nt1); }
.nxt-btn.nt2 { background: var(--nt2); }
.nxt-btn:hover { opacity: .85; }

.fin-btn {
  width: 100%; padding: 15px; border: none; border-radius: 12px; color: #000;
  font-family:'Space Mono',monospace; font-size:.88rem; font-weight:700;
  cursor: pointer; transition: opacity .13s; margin-top: 9px; display: none;
}
.fin-btn.nt1 { background: var(--nt1); }
.fin-btn.nt2 { background: var(--nt2); }
.fin-btn:hover { opacity: .85; }

/* DONE */
#done-screen { text-align: center; padding-top: 52px; }
.done-icon { font-size: 3rem; margin-bottom: 12px; }
.done-ttl { font-family:'Space Mono',monospace; font-size:1.35rem; color:var(--accent2); margin-bottom:8px; }
.done-sub { color:var(--muted); margin-bottom:28px; font-size:.88rem; }
.done-acts { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.d-btn { padding:12px 26px; border-radius:10px; font-family:'Space Mono',monospace; font-size:.83rem; cursor:pointer; transition:all .13s; }
.d-btn.out { background:transparent; border:1.5px solid var(--accent); color:var(--accent); }
.d-btn.out:hover { background:var(--accent); color:#000; }
.d-btn.fil { background:var(--accent2); border:none; color:#000; font-weight:700; }
.d-btn.fil:hover { opacity:.85; }

@keyframes fi { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <h1 style="color:var(--accent)">✏️ Dictation Practice</h1>
  <p class="subtitle">テキストを選んでください</p>
  <div class="home-grid">
    <div class="book-card nt1" onclick="goSelect('nt1')">
      <div class="book-icon">📘</div>
      <div class="book-title">NT 1</div>
      <div class="book-desc">Lesson 1-1 〜 12-4<br>基礎英語・入門レベル</div>
    </div>
    <div class="book-card nt2" onclick="goSelect('nt2')">
      <div class="book-icon">📗</div>
      <div class="book-title">NT 2</div>
      <div class="book-desc">Lesson 1-1 〜 12-3<br>標準英語・中級レベル</div>
    </div>
  </div>
</div>

<!-- SELECT -->
<div id="select-screen" class="screen">
  <button class="back-btn" onclick="goHome()">← ホームへ</button>
  <h1 id="sel-title"></h1>
  <p class="subtitle">レッスンを選んで ▶ スタートを押してください</p>
  <div class="lesson-grid" id="lesson-grid"></div>
  <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">▶ スタート</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <button class="back-btn" onclick="goSelect(curBook)">← レッスン選択へ</button>
  <h1 id="quiz-title"></h1>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog"></div></div>
  <div id="cards"></div>
  <div class="act-row">
    <button class="reveal-btn" id="rev-btn" onclick="revealAll()">🔍 解答を表示</button>
    <button class="nxt-btn" id="nxt-btn" onclick="nextRound()">次のセット ▶</button>
  </div>
  <button class="fin-btn" id="fin-btn" onclick="showDone()">終了する</button>
</div>

<!-- DONE -->
<div id="done-screen" class="screen">
  <div class="done-icon">🎉</div>
  <div class="done-ttl">お疲れさまでした！</div>
  <p class="done-sub">書き取り練習が完了しました。</p>
  <div class="done-acts">
    <button class="d-btn out" onclick="goSelect(curBook)">← 同じテキストで続ける</button>
    <button class="d-btn fil" onclick="goHome()">🏠 ホームへ</button>
  </div>
</div>

// ──────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────
let curBook = 'nt1';
let curLesson = null;
let curSents = [];
let cardSpd = [1.0, 1.0, 1.0]; // カードごとの速度
let currentBtn = null; // 現在再生中のボタン

// ──────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────
const show = id => { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); };
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rand3 = arr => [...arr].sort(()=>Math.random()-.5).slice(0,Math.min(3,arr.length));
const C = id => document.getElementById(id);

// ──────────────────────────────────────────────────────
// NAV
// ──────────────────────────────────────────────────────
function goHome() { synth().cancel(); show('home-screen'); }

function goSelect(book) {
  synth().cancel();
  curBook = book;
  curLesson = null;
  // title
  C('sel-title').textContent = `📚 ${DATA[book].label} — レッスン選択`;
  C('sel-title').style.color = `var(--${book})`;
  // start btn
  C('start-btn').className = `start-btn ${book}`;
  C('start-btn').disabled = true;
  // grid
  const grid = C('lesson-grid');
  grid.innerHTML = '';
  Object.keys(DATA[book].lessons).forEach(key => {
    const b = document.createElement('button');
    b.className = 'lesson-btn';
    b.textContent = `Lesson\n${key}`;
    b.onclick = () => {
      grid.querySelectorAll('.lesson-btn').forEach(x=>x.className='lesson-btn');
      b.classList.add(`sel-${book}`);
      curLesson = key;
      C('start-btn').disabled = false;
    };
    grid.appendChild(b);
  });
  show('select-screen');
}

// ──────────────────────────────────────────────────────
// QUIZ
// ──────────────────────────────────────────────────────
function startQuiz() {
  C('quiz-title').textContent = `✏️ ${DATA[curBook].label} — Lesson ${curLesson}`;
  C('quiz-title').style.color = `var(--${curBook})`;
  C('prog').className = `progress-bar ${curBook}`;
  C('nxt-btn').className = `nxt-btn ${curBook}`;
  C('fin-btn').className = `fin-btn ${curBook}`;
  loadRound();
  show('quiz-screen');
}

function loadRound() {
  curSents = rand3(DATA[curBook].lessons[curLesson]);
  cardSpd = [1.0, 1.0, 1.0];
  currentBtn = null;
  renderCards();
  C('prog').style.width = '0%';
  C('rev-btn').className = 'reveal-btn';
  C('rev-btn').textContent = '🔍 解答を表示';
  C('nxt-btn').style.display = 'none';
  C('fin-btn').style.display = 'none';
}

function renderCards() {
  const box = C('cards');
  box.innerHTML = '';
  curSents.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'sentence-card';
    d.innerHTML = `
      <div class="sentence-num ${curBook}">SENTENCE ${i+1} / 3</div>
      <div class="play-row">
        <button class="play-btn ${curBook}" id="pb${i}" onclick="play(${i})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          再生
        </button>
        <div class="speed-controls">
          <span class="speed-lbl">速度:</span>
          <button class="spd ${cardSpd[i]===0.7?'on-'+curBook:''}" onclick="setSpd(0.7,this,${i})">0.7x</button>
          <button class="spd ${cardSpd[i]===1.0?'on-'+curBook:''}" onclick="setSpd(1.0,this,${i})">1.0x</button>
          <button class="spd ${cardSpd[i]===1.3?'on-'+curBook:''}" onclick="setSpd(1.3,this,${i})">1.3x</button>
        </div>
      </div>
      <div class="ans-box" id="ab${i}">
        <div class="ans-tag">✓ Answer</div>
        <div class="ans-txt">${esc(s)}</div>
      </div>`;
    box.appendChild(d);
  });
}

function setSpd(v, btn, idx) {
  cardSpd[idx] = v;
  btn.closest('.speed-controls').querySelectorAll('.spd').forEach(b => {
    b.className = 'spd';
    if (parseFloat(b.textContent) === v) b.classList.add(`on-${curBook}`);
  });
}

function synth() { return window.speechSynthesis || {cancel:()=>{},speak:()=>{}}; }

function resetPlayBtn(btn) {
  btn.classList.remove('on');
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> もう一度`;
}

function play(i) {
  synth().cancel();
  // 前のボタンをリセット
  if (currentBtn) resetPlayBtn(currentBtn);
  const btn = C(`pb${i}`);
  currentBtn = btn;
  btn.classList.add('on');
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 再生中...`;
  const u = new SpeechSynthesisUtterance(curSents[i]);
  u.lang = 'en-US'; u.rate = cardSpd[i];
  const done = () => {
    if (currentBtn === btn) {
      resetPlayBtn(btn);
      currentBtn = null;
    }
  };
  u.onend = done;
  u.onerror = done;
  synth().speak(u);
}

function revealAll() {
  curSents.forEach((_,i)=>C(`ab${i}`).classList.add('show'));
  C('rev-btn').classList.add('done');
  C('rev-btn').textContent = '✓ 解答表示済み';
  C('nxt-btn').style.display = 'flex';
  C('fin-btn').style.display = 'block';
  C('prog').style.width = '100%';
}

function nextRound() { synth().cancel(); currentBtn = null; loadRound(); }

function showDone() { synth().cancel(); currentBtn = null; show('done-screen'); }

// Enter key → start quiz (when on select screen and lesson chosen)
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const sel = document.getElementById('select-screen');
    const quiz = document.getElementById('quiz-screen');
    if (sel.classList.contains('active')) {
      const sb = C('start-btn');
      if (!sb.disabled) startQuiz();
    } else if (quiz.classList.contains('active')) {
      // Enter on quiz screen: reveal if not yet, else next round
      const rb = C('rev-btn');
      if (!rb.classList.contains('done')) revealAll();
      else nextRound();
    }
  }
});
</script>
