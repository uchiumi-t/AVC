<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1014;
  --surface: #161920;
  --border: #252932;
  --gold: #e8b84b;
  --gold-dim: #7a5e1a;
  --gold-glow: rgba(232,184,75,0.12);
  --text: #eaedf5;
  --text-sub: #8890a6;
  --text-hint: #404660;
  --green: #4ecb8d;
  --grade-colors: #5b9cf6, #4ecb8d, #f0a500, #e05c5c;
}

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  overflow: hidden;
}

/* ══════════════ HOME ══════════════ */
#screen-home {
  height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
}

.home-eyebrow {
  font-size: 11px; letter-spacing: 0.3em; color: var(--text-hint);
  text-transform: uppercase; margin-bottom: 16px;
}
.home-title {
  font-size: clamp(28px, 4vw, 48px); font-weight: 900;
  color: var(--gold); letter-spacing: 0.04em; margin-bottom: 8px;
  text-align: center;
}
.home-sub {
  font-size: 14px; color: var(--text-sub); margin-bottom: 52px;
  letter-spacing: 0.1em; text-align: center;
}

.grade-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; width: 100%; max-width: 640px;
}

.grade-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 28px 24px; cursor: pointer;
  font-family: inherit; text-align: left;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  position: relative; overflow: hidden;
}
.grade-btn::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 16px 16px 0 0;
}
.grade-btn:nth-child(1)::before { background: #5b9cf6; }
.grade-btn:nth-child(2)::before { background: #4ecb8d; }
.grade-btn:nth-child(3)::before { background: #f0a500; }
.grade-btn:nth-child(4)::before { background: #e05c5c; }

.grade-btn:hover { transform: translateY(-3px); }
.grade-btn:nth-child(1):hover { border-color: #5b9cf6; box-shadow: 0 8px 28px rgba(91,156,246,0.15); }
.grade-btn:nth-child(2):hover { border-color: #4ecb8d; box-shadow: 0 8px 28px rgba(78,203,141,0.15); }
.grade-btn:nth-child(3):hover { border-color: #f0a500; box-shadow: 0 8px 28px rgba(240,165,0,0.15); }
.grade-btn:nth-child(4):hover { border-color: #e05c5c; box-shadow: 0 8px 28px rgba(224,92,92,0.15); }

.grade-label {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}
.grade-btn:nth-child(1) .grade-label { color: #5b9cf6; }
.grade-btn:nth-child(2) .grade-label { color: #4ecb8d; }
.grade-btn:nth-child(3) .grade-label { color: #f0a500; }
.grade-btn:nth-child(4) .grade-label { color: #e05c5c; }

.grade-title {
  font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px;
}
.grade-count {
  font-size: 12px; color: var(--text-sub);
}

/* ══════════════ QUIZ SCREEN ══════════════ */
#screen-quiz {
  display: none; height: 100vh;
  flex-direction: column;
}

/* Top bar */
.quiz-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px 14px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-left { display: flex; align-items: center; gap: 16px; }

.back-btn {
  font-size: 11px; font-family: inherit; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 14px;
  border: 1.5px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--text-sub); cursor: pointer;
  transition: all 0.15s;
}
.back-btn:hover { border-color: var(--text-sub); color: var(--text); }

.grade-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  padding: 4px 12px; border-radius: 20px; text-transform: uppercase;
}

.progress-text {
  font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-sub);
}
.progress-text em { font-style: normal; color: var(--gold); font-size: 16px; }

/* Progress bar */
.progress-bar-wrap {
  height: 3px; background: var(--border); flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%; background: var(--gold);
  transition: width 0.4s ease; width: 0%;
}

/* Main card area */
.quiz-main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 48px; gap: 0;
  min-height: 0;
}

/* Instruction line */
.txt-instruction {
  font-size: 13px; color: var(--text-hint); letter-spacing: 0.06em;
  margin-bottom: 28px; text-align: center;
  font-weight: 400; line-height: 1.6;
}

/* Japanese sentence */
.txt-japanese {
  font-size: clamp(22px, 3.2vw, 40px); font-weight: 700;
  color: var(--text-sub); text-align: center; line-height: 1.65;
  margin-bottom: 24px; max-width: 900px;
  animation: fadeUp 0.35s ease both;
}

/* English sentence with blanks */
.txt-english {
  font-family: 'Lora', Georgia, serif;
  font-size: clamp(20px, 2.8vw, 36px);
  color: var(--text); text-align: center; line-height: 1.7;
  max-width: 900px;
  animation: fadeUp 0.35s 0.05s ease both;
}

/* Filled-in answer word inside the sentence */
.filled-word {
  display: inline-block;
  color: var(--gold);
  font-style: italic;
  font-weight: 600;
  border-bottom: 2px solid var(--gold-dim);
  padding: 0 2px;
  animation: wordReveal 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes wordReveal {
  from { opacity: 0; transform: translateY(6px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Answer reveal (answer label below) */
.answer-wrap {
  margin-top: 32px; text-align: center;
  animation: answerIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.answer-label {
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--text-hint); margin-bottom: 6px; font-weight: 700;
}
.answer-text {
  font-family: 'Lora', Georgia, serif;
  font-size: clamp(18px, 2.4vw, 30px); font-weight: 600;
  color: var(--gold-dim);
  line-height: 1.3;
  letter-spacing: 0.05em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes answerIn {
  from { opacity: 0; transform: scale(0.88) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Bottom bar */
.quiz-bottombar {
  border-top: 1px solid var(--border); flex-shrink: 0;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
}

.key-hints {
  display: flex; gap: 20px; align-items: center;
}
.hint {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: var(--text-hint); letter-spacing: 0.06em;
}
.key {
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid #2a2f3d; border-bottom: 2px solid #1e2230;
  border-radius: 5px; padding: 2px 8px; min-width: 28px;
  font-size: 10px; font-family: 'DM Mono', monospace;
  background: #131620; color: #404660;
}

.answer-status {
  font-size: 12px; color: var(--text-hint); letter-spacing: 0.06em;
  font-weight: 700; min-width: 80px; text-align: right;
}
.answer-status.shown { color: var(--gold); }

/* ══════════════ GRADE COLORS ══════════════ */
.g1 { color: #5b9cf6; background: rgba(91,156,246,0.1); border-color: rgba(91,156,246,0.3); }
.g2 { color: #4ecb8d; background: rgba(78,203,141,0.1); border-color: rgba(78,203,141,0.3); }
.g3 { color: #f0a500; background: rgba(240,165,0,0.1);  border-color: rgba(240,165,0,0.3); }
.g4 { color: #e05c5c; background: rgba(224,92,92,0.1);  border-color: rgba(224,92,92,0.3); }

.hidden { display: none !important; }
</style>
</head>

// Build per-grade decks
const decks = {1:[],2:[],3:[],4:[]};
raw.forEach(r => decks[r[0]].push({ grade:r[0], num:r[1], inst:r[2], jp:r[3], en:r[4], ans:r[5] }));

// Update home counts
[1,2,3,4].forEach(g => {
  document.getElementById('count-'+g).textContent = decks[g].length + ' 問';
});

// ═══════ STATE ═══════
let currentGrade = 1;
let currentDeck  = [];
let idx          = 0;
let answerShown  = false;

const gradeNames = {1:'Grade 1',2:'Grade 2',3:'Grade 3',4:'Grade 4'};
const gradeClasses = {1:'g1',2:'g2',3:'g3',4:'g4'};

// ═══════ SPEECH ═══════
const synth = window.speechSynthesis;
let enVoice = null;
function loadVoice() {
  const v = synth.getVoices();
  enVoice = v.find(x=>x.lang==='en-US') || v.find(x=>x.lang==='en-GB') || v.find(x=>x.lang.startsWith('en'));
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoice;
loadVoice();

function speakFilled() {
  if (!currentDeck[idx]) return;
  const card = currentDeck[idx];
  const ansWords = card.ans.split(/\s+/).filter(w => w !== '…');
  const blankCount = (card.en.match(/\([^)]*\)/g) || []).length;
  const words = [];
  for (let i = 0; i < blankCount; i++) {
    words.push(ansWords[i % ansWords.length]);
  }
  let wi = 0;
  let enText = card.en.replace(/\([^)]*\)/g, () => words[wi++] || '');
  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(enText);
    u.lang = 'en-US'; u.rate = 0.88;
    if (enVoice) u.voice = enVoice;
    synth.speak(u);
  };
  if (synth.speaking) {
    synth.cancel();
    setTimeout(doSpeak, 150);
  } else {
    doSpeak();
  }
}

// ═══════ BLANK FILL LOGIC ═══════
/**
 * Build an HTML string where each (     ) blank is replaced with
 * the corresponding answer word wrapped in a .filled-word span.
 * Extra blanks beyond available answer words get a "?" placeholder.
 */
function buildFilledHTML(enTemplate, answerPhrase) {
  // Split answer phrase by spaces, then remove "…" tokens
  const ansWords = answerPhrase.split(/\s+/).filter(w => w !== '…');
  // Count how many blanks exist in the template
  const blankCount = (enTemplate.match(/\([^)]*\)/g) || []).length;
  // If ansWords doesn't cover all blanks, repeat the word list to fill them
  const words = [];
  for (let i = 0; i < blankCount; i++) {
    words.push(ansWords[i % ansWords.length]);
  }
  let wi = 0;
  return enTemplate.replace(/\([^)]*\)/g, () => {
    const word = words[wi];
    wi++;
    return `<span class="filled-word" style="animation-delay:${(wi-1)*0.07}s">${escapeHtml(word)}</span>`;
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/** Build the blank version (question state) */
function buildBlankHTML(enTemplate) {
  return escapeHtml(enTemplate).replace(/\([^)]*\)/g, '<span style="color:var(--text-hint)">(\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0)</span>');
}

// ═══════ SCREENS ═══════
function startGrade(g) {
  currentGrade = g;
  currentDeck  = decks[g];
  idx          = 0;
  answerShown  = false;
  document.getElementById('screen-home').style.display='none';
  const sq = document.getElementById('screen-quiz');
  sq.style.display='flex';
  const badge = document.getElementById('grade-badge');
  badge.className = 'grade-badge ' + gradeClasses[g];
  badge.textContent = gradeNames[g];
  document.getElementById('prog-total').textContent = currentDeck.length;
  renderCard();
}

function goHome() {
  if (synth.speaking) synth.cancel();
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-home').style.display='flex';
}

// ═══════ RENDER ═══════
function renderCard(direction) {
  answerShown = false;
  const card = currentDeck[idx];
  const main = document.getElementById('quiz-main');
  main.style.opacity='0';
  main.style.transform=`translateX(${direction===1?'30px':direction===-1?'-30px':'0'})`;
  requestAnimationFrame(()=>{
    document.getElementById('txt-instruction').textContent = card.inst;
    document.getElementById('txt-japanese').textContent   = card.jp;

    // Show blanks as empty placeholders
    const enEl = document.getElementById('txt-english');
    enEl.innerHTML = buildBlankHTML(card.en);

    document.getElementById('answer-wrap').classList.add('hidden');
    document.getElementById('answer-text').textContent = '';
    document.getElementById('answer-status').textContent = '';
    document.getElementById('answer-status').classList.remove('shown');

    document.getElementById('prog-cur').textContent = idx + 1;
    document.getElementById('prog-num').textContent = card.num;
    const pct = ((idx + 1) / currentDeck.length) * 100;
    document.getElementById('prog-bar').style.width = pct + '%';

    requestAnimationFrame(()=>{
      main.style.transition='opacity 0.3s ease, transform 0.3s ease';
      main.style.opacity='1';
      main.style.transform='translateX(0)';
    });
  });
}

function showAnswer() {
  if (answerShown) return;
  answerShown = true;
  const card = currentDeck[idx];

  // Fill blanks inline with gold animated words
  const enEl = document.getElementById('txt-english');
  enEl.innerHTML = buildFilledHTML(card.en, card.ans);

  // Show small answer label below (dimmed, for reference)
  document.getElementById('answer-text').textContent = card.ans;
  document.getElementById('answer-wrap').classList.remove('hidden');
  document.getElementById('answer-status').textContent = '解答表示中';
  document.getElementById('answer-status').classList.add('shown');

  // Auto-speak filled sentence
  speakFilled();
}

// ═══════ KEYBOARD ═══════
document.addEventListener('keydown', e => {
  const quizVisible = document.getElementById('screen-quiz').style.display === 'flex';
  if (!quizVisible) return;

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (synth.speaking) synth.cancel();
    if (idx < currentDeck.length - 1) { idx++; renderCard(1); }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (synth.speaking) synth.cancel();
    if (idx > 0) { idx--; renderCard(-1); }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    speakFilled();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (answerShown) {
      if (synth.speaking) synth.cancel();
      if (idx < currentDeck.length - 1) { idx++; renderCard(1); }
    } else {
      showAnswer();
    }
  } else if (e.key === 'Escape') {
    e.preventDefault();
    goHome();
  }
});
